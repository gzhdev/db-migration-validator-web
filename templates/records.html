{% extends "base.html" %}
{% block title %}记录浏览 — Run #{{ run.id }}{% endblock %}

{% block content %}
<div class="breadcrumb">
    <a href="{{ url_for('index') }}">首页</a> &rsaquo;
    <a href="{{ url_for('run_detail', run_id=run.id) }}">Run #{{ run.id }}</a> &rsaquo;
    记录浏览
</div>

<h1 class="page-title">记录浏览 — Run #{{ run.id }}</h1>

<!-- 筛选栏 -->
<div class="filter-bar card">
    <div class="filter-group">
        <label>表名</label>
        <select id="filter-table" class="select-table">
            <option value="">全部</option>
            {% for name in table_names %}
            <option value="{{ name }}" {% if name == selected_table %}selected{% endif %}>{{ name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="filter-group">
        <label>类型</label>
        <div class="btn-group" id="filter-type">
            <button class="btn btn-filter {% if not selected_type %}active{% endif %}" data-type="">全部</button>
            <button class="btn btn-filter {% if selected_type == 'mismatched' %}active{% endif %}" data-type="mismatched">不匹配</button>
            <button class="btn btn-filter {% if selected_type == 'missing_in_target' %}active{% endif %}" data-type="missing_in_target">目标缺失</button>
            <button class="btn btn-filter {% if selected_type == 'missing_in_source' %}active{% endif %}" data-type="missing_in_source">源缺失</button>
            <button class="btn btn-filter {% if selected_type == 'value_check_failed' %}active{% endif %}" data-type="value_check_failed">取值失败</button>
            <button class="btn btn-filter {% if selected_type == 'matched' %}active{% endif %}" data-type="matched">匹配</button>
        </div>
    </div>
    <div class="filter-group filter-group--right">
        <label>主键搜索</label>
        <div class="pk-search-wrap">
            <input type="text" id="filter-pk" class="input-pk" placeholder="输入主键值…">
            <button class="btn btn-pk-clear" id="btn-pk-clear" title="清除">&#x2715;</button>
        </div>
    </div>
    <div class="filter-group">
        <label>每页</label>
        <select id="filter-page-size" class="select-page-size">
            <option value="20">20 条</option>
            <option value="50">50 条</option>
            <option value="100">100 条</option>
        </select>
    </div>
</div>

<!-- 记录列表（JS 填充） -->
<div id="records-container">
    <div class="loading">加载中…</div>
</div>

<!-- 分页控件（JS 填充） -->
<div id="pagination-container"></div>
{% endblock %}

{% block page_data %}
<script>
    window.RUN_ID = {{ run.id }};
</script>
{% endblock %}
